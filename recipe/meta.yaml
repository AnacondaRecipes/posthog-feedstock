{% set name = "posthog" %}
{% set version = "7.14.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 3be5e513f07e4ee5119f98b0458cb640739b49cef7c96c3e18b1d65076b18239

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<310]

requirements:
  host:
    - python
    - pip
    - setuptools >=61.0
    - wheel
  run:
    - python
    - requests >=2.7,<3.0
    - backoff >=1.10.0
    - distro >=1.5.0
    - typing-extensions >=4.2.0
  run_constrained:
    # langchain
    - langchain >=0.2.0
    # otel
    - opentelemetry-sdk >=1.20.0
    - opentelemetry-exporter-otlp-proto-http >=1.20.0

test:
  imports:
    - posthog
    - posthog.ai
    - posthog.ai.langchain
    - posthog.ai.openai
    - posthog.ai.anthropic
    - posthog.ai.claude_agent_sdk
    - posthog.ai.otel
  commands:
    - pip check
    - pytest --pyargs posthog.test --deselect=test_client.py::TestClient::test_basic_capture_exception_with_no_exception_given
  requires:
    - freezegun =1.5.1
    - pip
    - pytest
    - pytest-timeout
    - pytest-asyncio
    - parameterized >=0.8.1
    - pydantic >=2.12.0
    - langchain >=0.2.0
    - opentelemetry-sdk >=1.20.0
    - opentelemetry-exporter-otlp-proto-http >=1.20.0
    - openai >=2.0
    # Only 0.50 in main channel, update lower-bound
    - anthropic >=0.50.0
    - claude-agent-sdk

about:
  home: https://github.com/PostHog/posthog-python
  summary: Integrate PostHog into any python application
  license: MIT
  license_family: MIT
  license_file: LICENSE
  description: |
    The Python SDK makes it easy to capture events, evaluate feature flags, track errors, and more in your Python apps.
  dev_url: https://github.com/PostHog/posthog-python
  doc_url: https://posthog.com/docs/libraries/python


extra:
  recipe-maintainers:
    - Twixes
    - yakkomajuri
    - neilkakkar
    - posthog-bot
